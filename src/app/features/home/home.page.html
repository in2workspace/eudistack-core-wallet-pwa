<ion-content [fullscreen]="true" class="ion-padding home-content no-scroll">
  @if ((canInstall$ | async) && !bannerDismissed) {
    <div class="install-banner">
      <ion-icon name="download-outline" class="install-banner-icon"></ion-icon>
      <span class="install-banner-text">{{"home.install-hint"|translate}}</span>
      <ion-button size="small" fill="solid" (click)="installApp()" (keydown.enter)="installApp()" (keydown.space)="installApp()">
        {{"menu.install"|translate}}
      </ion-button>
      <ion-button size="small" fill="clear" class="install-banner-close" (click)="dismissInstallBanner()" (keydown.enter)="dismissInstallBanner()" (keydown.space)="dismissInstallBanner()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </div>
  }
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-button
        style="margin-top: 5rem; width: 15rem; height: 5rem"
        size="large"
        (click)="startScan()"
        (keydown)="handleButtonKeydown($event)"
      >
        <div class="custom-button-content">
          <ion-icon size="large" color="white" name="qr-code-outline"></ion-icon>
          <ion-label>{{"home.scan"|translate}}</ion-label>
        </div></ion-button
      >
    </ion-row>

  </ion-grid>
</ion-content>
