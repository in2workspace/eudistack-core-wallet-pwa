<ion-app [ngClass]="{ 'no-header': isBaseRoute$() }">
  @if(!isBaseRoute$()){
  <ion-header [translucent]="false">
    <ion-toolbar class="toolbar" [ngClass]="{ 'blurred': isAuthRoute$() }">
      <img alt="Logo" [src]="logoSrc" width="auto" slot="start" height="35px" class="logo"/>
      <ion-button
        slot="end"
        fill="clear"
        class="toolbar-but"
        [disabled]="isAuthRoute$()"
        (click)="openPopover($event)"
        (keydown)="openPopoverByKeydown($event)"
        >
        <ion-icon
          slot="icon-only"
          name="ellipsis-vertical"
          style="color: var(--primary-contrast-color)"
        ></ion-icon>
      </ion-button>
    </ion-toolbar>
  </ion-header>
}
  <ion-router-outlet id="main-content" class="main-content"></ion-router-outlet>
  @if(isLoading$()){
  <div class="overlay">
    <div class="spinner"></div>
  </div>
  }
</ion-app>
